<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Modern gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>

  <!-- Stylized "M" letter - modern geometric design -->
  <g fill="white" filter="url(#shadow)">
    <!-- Left vertical bar -->
    <rect x="100" y="140" width="56" height="232" rx="8"/>
    <!-- Right vertical bar -->
    <rect x="356" y="140" width="56" height="232" rx="8"/>
    <!-- Left diagonal -->
    <polygon points="156,140 256,280 256,220 180,140"/>
    <!-- Right diagonal -->
    <polygon points="356,140 256,280 256,220 332,140"/>
    <!-- Center peak connector -->
    <polygon points="228,220 256,260 284,220 284,280 256,320 228,280"/>
  </g>

  <!-- Modern "X" badge - representing leads/conversions -->
  <g transform="translate(360, 80)">
    <circle cx="56" cy="56" r="56" fill="url(#accentGrad)"/>
    <circle cx="56" cy="56" r="48" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
    <!-- Stylized X -->
    <path d="M35 35 L77 77 M77 35 L35 77" stroke="white" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
