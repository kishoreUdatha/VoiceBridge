# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name myleadx.ai *.myleadx.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API Server - api.myleadx.ai
server {
    listen 443 ssl http2;
    server_name api.myleadx.ai;

    ssl_certificate /etc/letsencrypt/live/myleadx.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myleadx.ai/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API routes
    location / {
        proxy_pass http://myleadx-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Rate limiting for API
        limit_req zone=api burst=20 nodelay;
    }

    # WebSocket support
    location /socket.io {
        proxy_pass http://myleadx-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}

# Main App - app.myleadx.ai and tenant subdomains
server {
    listen 443 ssl http2;
    server_name app.myleadx.ai *.myleadx.ai;

    ssl_certificate /etc/letsencrypt/live/myleadx.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myleadx.ai/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static files (Frontend)
    location / {
        proxy_pass http://myleadx-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# Landing page - myleadx.ai (www redirect)
server {
    listen 443 ssl http2;
    server_name myleadx.ai www.myleadx.ai;

    ssl_certificate /etc/letsencrypt/live/myleadx.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myleadx.ai/privkey.pem;

    # Redirect to app
    return 301 https://app.myleadx.ai$request_uri;
}
