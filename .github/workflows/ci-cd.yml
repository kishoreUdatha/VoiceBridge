# ================================================================
# MyLeadX - CI/CD Pipeline
# ================================================================
# Complete pipeline: Build → Test → Security → Docker → Deploy
# ================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

# ================================================================
# JOBS
# ================================================================
jobs:

  # ================================
  # Stage 1: Code Quality
  # ================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint --if-present
        continue-on-error: true

  # ================================
  # Stage 2: Build
  # ================================
  build-backend:
    name: 🔨 Build Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Build
        working-directory: ./backend
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
          retention-days: 1

  build-frontend:
    name: 🔨 Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.myleadx.ai/api
          VITE_APP_NAME: MyLeadX

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 1

  # ================================
  # Stage 3: Security Scan
  # ================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit Backend Dependencies
        working-directory: ./backend
        run: npm audit --audit-level=critical || true

      - name: Audit Frontend Dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=critical || true

      - name: Check for secrets in code
        run: |
          if grep -rE "(password|secret|api_key|apikey)\s*=\s*['\"][^'\"]+['\"]" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v ".env"; then
            echo "⚠️ Potential hardcoded secrets found!"
          else
            echo "✅ No hardcoded secrets detected"
          fi

  # ================================
  # Stage 4: Docker Build
  # ================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: myleadx-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: myleadx-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.myleadx.ai/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Stage 5: Deploy to Production
  # ================================
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://app.myleadx.ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            echo "=========================================="
            echo "  MyLeadX Production Deployment"
            echo "=========================================="

            cd ~/myleadx

            echo ""
            echo "📥 Step 1: Pulling latest code..."
            git fetch --all --prune
            git reset --hard origin/main

            echo ""
            echo "🔨 Step 2: Building containers..."
            docker-compose -f docker-compose.prod.yml --env-file .env.production build --parallel

            echo ""
            echo "🛑 Step 3: Stopping old containers..."
            docker-compose -f docker-compose.prod.yml --env-file .env.production down

            echo ""
            echo "🚀 Step 4: Starting new containers..."
            docker-compose -f docker-compose.prod.yml --env-file .env.production up -d

            echo ""
            echo "⏳ Step 5: Waiting for services..."
            sleep 20

            echo ""
            echo "📊 Step 6: Running database migrations..."
            docker exec myleadx-backend npx prisma migrate deploy || echo "Migration skipped"

            echo ""
            echo "🧹 Step 7: Cleaning up old images..."
            docker image prune -f

            echo ""
            echo "✅ Deployment Complete!"
            echo ""
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Health Check
        run: |
          echo "Waiting for services to start..."
          sleep 30

          echo "Running health checks..."

          # Check API
          if curl -sf --max-time 30 https://api.myleadx.ai/api/health > /dev/null; then
            echo "✅ API is healthy"
          else
            echo "⚠️ API health check failed (may still be starting)"
          fi

          # Check Frontend
          if curl -sf --max-time 30 https://app.myleadx.ai > /dev/null; then
            echo "✅ Frontend is healthy"
          else
            echo "⚠️ Frontend health check failed (may still be starting)"
          fi
        continue-on-error: true

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 MyLeadX Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: https://app.myleadx.ai" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: https://api.myleadx.ai" >> $GITHUB_STEP_SUMMARY
          echo "- **API Docs**: https://api.myleadx.ai/api-docs" >> $GITHUB_STEP_SUMMARY

  # ================================
  # Stage 6: Post-Deploy Notification
  # ================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Notify Success
        if: needs.deploy-production.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "App: https://app.myleadx.ai"
          echo "API: https://api.myleadx.ai"

      - name: Notify Failure
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs for details."
          exit 1

