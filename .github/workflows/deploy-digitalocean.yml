# ================================================================
# VoiceBridge - DigitalOcean Deployment Workflow
# ================================================================
# This workflow deploys to DigitalOcean App Platform on push to main
# ================================================================

name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

jobs:
  # ================================
  # Test Job
  # ================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend linting
        working-directory: ./backend
        run: npm run lint || true

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend linting
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com

  # ================================
  # Deploy Job
  # ================================
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get App ID
        id: get-app-id
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep voicebridge | awk '{print $1}')
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT

      - name: Deploy to App Platform
        if: steps.get-app-id.outputs.app_id != ''
        run: |
          doctl apps create-deployment ${{ steps.get-app-id.outputs.app_id }} --wait

      - name: Create App (if not exists)
        if: steps.get-app-id.outputs.app_id == ''
        run: |
          doctl apps create --spec .do/app.yaml --wait

      - name: Get Deployment URL
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep voicebridge | awk '{print $1}')
          APP_URL=$(doctl apps get $APP_ID --format DefaultIngress --no-header)
          echo "::notice::Deployed to: $APP_URL"

  # ================================
  # Notify Job
  # ================================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Notify on Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          # Add Slack/Discord notification here if needed

      - name: Notify on Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          # Add Slack/Discord notification here if needed
