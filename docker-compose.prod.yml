version: '3.8'

# Production Docker Compose Configuration for DigitalOcean Droplet
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: voicebridge-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voicebridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-voicebridge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voicebridge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voicebridge-network

  redis:
    image: redis:7-alpine
    container_name: voicebridge-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voicebridge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: voicebridge-backend-prod
    restart: always
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm_lead_generation}
      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      # Server
      PORT: ${PORT:-3000}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      BASE_URL: ${BASE_URL:?BASE_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-}
      # Plivo
      PLIVO_AUTH_ID: ${PLIVO_AUTH_ID:-}
      PLIVO_AUTH_TOKEN: ${PLIVO_AUTH_TOKEN:-}
      PLIVO_PHONE_NUMBER: ${PLIVO_PHONE_NUMBER:-}
      # Provider Selection
      SMS_PROVIDER: ${SMS_PROVIDER:-twilio}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-twilio}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      # Email SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Facebook
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_VERIFY_TOKEN: ${FACEBOOK_VERIFY_TOKEN:-}
      # LinkedIn
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      # Redis
      REDIS_URL: redis://redis:6379
      # Deepgram
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      # Sarvam AI
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - voicebridge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    container_name: voicebridge-frontend-prod
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - voicebridge-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  voicebridge-network:
    driver: bridge
