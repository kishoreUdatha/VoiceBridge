version: '3.8'

# MyLeadX Production Docker Compose for AWS EC2 with RDS
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  redis:
    image: redis:7-alpine
    container_name: myleadx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --daemonize no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - myleadx-network
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myleadx-backend
    restart: always
    environment:
      # Database (RDS)
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      # Server
      PORT: 8080
      NODE_ENV: production
      FRONTEND_URL: https://myleadx.ai
      BASE_URL: https://api.myleadx.ai
      CORS_ORIGINS: https://myleadx.ai,https://app.myleadx.ai,https://*.myleadx.ai
      # Super Admin
      SUPER_ADMIN_SETUP_KEY: ${SUPER_ADMIN_SETUP_KEY:-}
      # Exotel
      EXOTEL_API_KEY: ${EXOTEL_API_KEY:-}
      EXOTEL_API_TOKEN: ${EXOTEL_API_TOKEN:-}
      EXOTEL_SID: ${EXOTEL_SID:-}
      EXOTEL_SUBDOMAIN: ${EXOTEL_SUBDOMAIN:-}
      EXOTEL_CALLER_ID: ${EXOTEL_CALLER_ID:-}
      # Plivo
      PLIVO_AUTH_ID: ${PLIVO_AUTH_ID:-}
      PLIVO_AUTH_TOKEN: ${PLIVO_AUTH_TOKEN:-}
      PLIVO_PHONE_NUMBER: ${PLIVO_PHONE_NUMBER:-}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      # Email SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@myleadx.ai}
      # WhatsApp
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-myleadx-uploads}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_RECORDINGS_BUCKET: ${AWS_RECORDINGS_BUCKET:-myleadx-recordings}
      # Redis
      REDIS_URL: redis://redis:6379
      # Deepgram
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      # ElevenLabs
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      # Credentials Encryption
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:?CREDENTIALS_ENCRYPTION_KEY is required}
    depends_on:
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - myleadx-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.myleadx.ai/api
        VITE_WS_URL: wss://api.myleadx.ai
    container_name: myleadx-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - myleadx-network

volumes:
  redis_data:
  uploads_data:

networks:
  myleadx-network:
    driver: bridge
