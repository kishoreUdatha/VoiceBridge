<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceBridge CRM</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="AI-Powered CRM for Indian Lead Management with Voice Calling" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VoiceBridge" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Primary font (Latin) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Indian Language Fonts -->
    <!-- Devanagari (Hindi, Marathi) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tamil -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Telugu -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Kannada -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Malayalam -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Gujarati -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Gurmukhi (Punjabi) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* Language-specific font families */
      :lang(hi-IN), :lang(mr-IN) {
        font-family: 'Noto Sans Devanagari', 'Inter', sans-serif;
      }
      :lang(ta-IN) {
        font-family: 'Noto Sans Tamil', 'Inter', sans-serif;
      }
      :lang(te-IN) {
        font-family: 'Noto Sans Telugu', 'Inter', sans-serif;
      }
      :lang(kn-IN) {
        font-family: 'Noto Sans Kannada', 'Inter', sans-serif;
      }
      :lang(ml-IN) {
        font-family: 'Noto Sans Malayalam', 'Inter', sans-serif;
      }
      :lang(gu-IN) {
        font-family: 'Noto Sans Gujarati', 'Inter', sans-serif;
      }
      :lang(bn-IN) {
        font-family: 'Noto Sans Bengali', 'Inter', sans-serif;
      }
      :lang(pa-IN) {
        font-family: 'Noto Sans Gurmukhi', 'Inter', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Unregister service worker in development -->
    <script>
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var registration of registrations) {
              registration.unregister().then(function() {
                console.log('Service worker unregistered for development');
              });
            }
          });
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
