<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLeadX - Legal Documents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            border-radius: 20px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            font-weight: bold;
        }
        h1 {
            color: #1F2937;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .tagline {
            color: #6B7280;
            margin-bottom: 35px;
            font-size: 1.1rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link {
            display: block;
            padding: 18px 25px;
            background: #F3F4F6;
            border-radius: 12px;
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .link:hover {
            background: #4F46E5;
            color: white;
            transform: translateY(-2px);
        }
        .link-icon {
            margin-right: 10px;
        }
        .footer {
            margin-top: 35px;
            color: #9CA3AF;
            font-size: 0.9rem;
        }
        .download-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #E5E7EB;
        }
        .download-btn {
            display: inline-block;
            padding: 15px 35px;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">M</div>
        <h1>MyLeadX</h1>
        <p class="tagline">Smart CRM for Telecallers</p>

        <div class="links">
            <a href="privacy-policy.html" class="link">
                <span class="link-icon">🔒</span> Privacy Policy
            </a>
            <a href="terms-of-service.html" class="link">
                <span class="link-icon">📜</span> Terms of Service
            </a>
        </div>

        <div class="download-section">
            <a href="https://play.google.com/store/apps/details?id=com.crmleads.telecaller" class="download-btn">
                📱 Download on Play Store
            </a>
        </div>

        <p class="footer">&copy; 2026 MyLeadX. All rights reserved.</p>
    </div>
</body>
</html>
