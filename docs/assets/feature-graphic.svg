<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F3F4F6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="100" fill="white" opacity="0.05"/>
  <circle cx="974" cy="450" r="150" fill="white" opacity="0.05"/>
  <circle cx="800" cy="80" r="80" fill="white" opacity="0.03"/>
  <circle cx="150" cy="400" r="60" fill="white" opacity="0.03"/>

  <!-- App Icon -->
  <g transform="translate(80, 150)">
    <rect width="120" height="120" rx="28" fill="white"/>
    <text x="60" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#4F46E5">M</text>
  </g>

  <!-- App Name -->
  <text x="230" y="200" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">MyLeadX</text>

  <!-- Tagline -->
  <text x="230" y="255" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.9">Smart CRM for Telecallers</text>

  <!-- Feature Pills -->
  <g transform="translate(230, 290)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="160" height="40" rx="20" fill="white" opacity="0.2"/>
    <text x="80" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="white">📞 One-Tap Calling</text>

    <!-- Pill 2 -->
    <rect x="175" y="0" width="150" height="40" rx="20" fill="white" opacity="0.2"/>
    <text x="250" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="white">📊 Track Leads</text>

    <!-- Pill 3 -->
    <rect x="340" y="0" width="180" height="40" rx="20" fill="white" opacity="0.2"/>
    <text x="430" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="white">📈 Boost Conversions</text>
  </g>

  <!-- Phone Mockup -->
  <g transform="translate(700, 50)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="200" height="400" rx="30" fill="#1F2937"/>
    <rect x="8" y="8" width="184" height="384" rx="24" fill="white"/>

    <!-- Status bar -->
    <rect x="8" y="8" width="184" height="35" rx="24" fill="#F3F4F6"/>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">12:00</text>

    <!-- Dashboard content -->
    <text x="25" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1F2937">Good Morning 👋</text>
    <text x="25" y="88" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Today's Stats</text>

    <!-- Stat cards row 1 -->
    <rect x="20" y="100" width="75" height="55" rx="10" fill="#4F46E5"/>
    <text x="57" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">24</text>
    <text x="57" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" opacity="0.8">LEADS</text>

    <rect x="105" y="100" width="75" height="55" rx="10" fill="#10B981"/>
    <text x="142" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">18</text>
    <text x="142" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" opacity="0.8">CALLS</text>

    <!-- Stat cards row 2 -->
    <rect x="20" y="165" width="75" height="55" rx="10" fill="#F59E0B"/>
    <text x="57" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">5</text>
    <text x="57" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" opacity="0.8">CALLBACKS</text>

    <rect x="105" y="165" width="75" height="55" rx="10" fill="#8B5CF6"/>
    <text x="142" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">67%</text>
    <text x="142" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" opacity="0.8">CONV. RATE</text>

    <!-- Lead list preview -->
    <text x="25" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1F2937">Recent Leads</text>

    <!-- Lead item 1 -->
    <rect x="20" y="260" width="160" height="40" rx="8" fill="#F3F4F6"/>
    <circle cx="40" cy="280" r="12" fill="#4F46E5"/>
    <text x="40" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">R</text>
    <text x="60" y="276" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#1F2937">Rahul Sharma</text>
    <text x="60" y="290" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">+91 98765...</text>
    <circle cx="160" cy="280" r="10" fill="#10B981"/>

    <!-- Lead item 2 -->
    <rect x="20" y="308" width="160" height="40" rx="8" fill="#F3F4F6"/>
    <circle cx="40" cy="328" r="12" fill="#7C3AED"/>
    <text x="40" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">P</text>
    <text x="60" y="324" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#1F2937">Priya Patel</text>
    <text x="60" y="338" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">+91 87654...</text>
    <circle cx="160" cy="328" r="10" fill="#10B981"/>

    <!-- Bottom nav -->
    <rect x="8" y="360" width="184" height="32" rx="0 0 24 24" fill="#F9FAFB"/>
    <circle cx="45" cy="376" r="8" fill="#4F46E5"/>
    <circle cx="85" cy="376" r="8" fill="#D1D5DB"/>
    <circle cx="125" cy="376" r="8" fill="#D1D5DB"/>
    <circle cx="165" cy="376" r="8" fill="#D1D5DB"/>
  </g>

  <!-- Download badge -->
  <g transform="translate(80, 380)">
    <rect width="200" height="50" rx="10" fill="url(#greenGrad)"/>
    <text x="100" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">📱 Download Free</text>
  </g>
</svg>
